<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0c2340"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="4" fill="url(#accent)"/>

  <!-- Glow -->
  <circle cx="300" cy="315" r="320" fill="#22c55e" opacity="0.03"/>
  <circle cx="900" cy="315" r="280" fill="#06b6d4" opacity="0.04"/>

  <!-- Floor plan mockup -->
  <rect x="80" y="110" width="500" height="390" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>

  <!-- Floor plan title bar -->
  <rect x="80" y="110" width="500" height="40" rx="12" fill="#0f172a"/>
  <rect x="80" y="138" width="500" height="12" fill="#0f172a"/>
  <text x="330" y="136" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#94a3b8" text-anchor="middle">Floor Plan — Building A</text>

  <!-- Rooms grid -->
  <!-- Room 1 - available -->
  <rect x="105" y="165" width="140" height="100" rx="4" fill="#22c55e" opacity="0.12" stroke="#22c55e" stroke-width="1.5"/>
  <text x="175" y="208" font-family="system-ui,sans-serif" font-size="11" fill="#22c55e" text-anchor="middle" font-weight="600">Room 101</text>
  <text x="175" y="224" font-family="system-ui,sans-serif" font-size="10" fill="#22c55e" text-anchor="middle">Available</text>

  <!-- Room 2 - occupied -->
  <rect x="260" y="165" width="140" height="100" rx="4" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="1.5"/>
  <text x="330" y="208" font-family="system-ui,sans-serif" font-size="11" fill="#ef4444" text-anchor="middle" font-weight="600">Room 102</text>
  <text x="330" y="224" font-family="system-ui,sans-serif" font-size="10" fill="#ef4444" text-anchor="middle">Occupied</text>

  <!-- Room 3 - reserved -->
  <rect x="415" y="165" width="140" height="100" rx="4" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="485" y="208" font-family="system-ui,sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle" font-weight="600">Room 103</text>
  <text x="485" y="224" font-family="system-ui,sans-serif" font-size="10" fill="#f59e0b" text-anchor="middle">Reserved</text>

  <!-- Row 2 -->
  <rect x="105" y="280" width="140" height="100" rx="4" fill="#22c55e" opacity="0.12" stroke="#22c55e" stroke-width="1.5"/>
  <text x="175" y="323" font-family="system-ui,sans-serif" font-size="11" fill="#22c55e" text-anchor="middle" font-weight="600">Room 201</text>
  <text x="175" y="339" font-family="system-ui,sans-serif" font-size="10" fill="#22c55e" text-anchor="middle">Available</text>

  <rect x="260" y="280" width="140" height="100" rx="4" fill="#22c55e" opacity="0.12" stroke="#22c55e" stroke-width="1.5"/>
  <text x="330" y="323" font-family="system-ui,sans-serif" font-size="11" fill="#22c55e" text-anchor="middle" font-weight="600">Room 202</text>
  <text x="330" y="339" font-family="system-ui,sans-serif" font-size="10" fill="#22c55e" text-anchor="middle">Available</text>

  <rect x="415" y="280" width="140" height="100" rx="4" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="1.5"/>
  <text x="485" y="323" font-family="system-ui,sans-serif" font-size="11" fill="#ef4444" text-anchor="middle" font-weight="600">Room 203</text>
  <text x="485" y="339" font-family="system-ui,sans-serif" font-size="10" fill="#ef4444" text-anchor="middle">Occupied</text>

  <!-- Legend -->
  <circle cx="120" cy="420" r="5" fill="#22c55e"/>
  <text x="133" y="424" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8">Available</text>
  <circle cx="195" cy="420" r="5" fill="#ef4444"/>
  <text x="208" y="424" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8">Occupied</text>
  <circle cx="275" cy="420" r="5" fill="#f59e0b"/>
  <text x="288" y="424" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8">Reserved</text>

  <!-- Booking panel -->
  <rect x="620" y="110" width="500" height="390" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <rect x="620" y="110" width="500" height="40" rx="12" fill="#1e293b"/>
  <rect x="620" y="138" width="500" height="12" fill="#1e293b"/>
  <text x="870" y="136" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#94a3b8" text-anchor="middle">Book a Space</text>

  <!-- Form fields -->
  <text x="650" y="185" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">Space</text>
  <rect x="650" y="193" width="440" height="34" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="668" y="214" font-family="system-ui,sans-serif" font-size="12" fill="#e2e8f0">Conference Room A</text>

  <text x="650" y="248" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">Date</text>
  <rect x="650" y="256" width="210" height="34" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="668" y="277" font-family="system-ui,sans-serif" font-size="12" fill="#e2e8f0">2025-03-18</text>

  <text x="880" y="248" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">Time</text>
  <rect x="880" y="256" width="210" height="34" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="898" y="277" font-family="system-ui,sans-serif" font-size="12" fill="#e2e8f0">10:00 – 12:00</text>

  <text x="650" y="318" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">Reserved by</text>
  <rect x="650" y="326" width="440" height="34" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="668" y="347" font-family="system-ui,sans-serif" font-size="12" fill="#e2e8f0">Mehdi Aichouch</text>

  <!-- Book button -->
  <rect x="650" y="385" width="440" height="40" rx="20" fill="#22c55e"/>
  <text x="870" y="410" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">Confirm Booking</text>

  <!-- Stats bar -->
  <rect x="650" y="445" width="100" height="40" rx="6" fill="#1e293b"/>
  <text x="700" y="461" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#22c55e" text-anchor="middle">12</text>
  <text x="700" y="477" font-family="system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Available</text>

  <rect x="762" y="445" width="100" height="40" rx="6" fill="#1e293b"/>
  <text x="812" y="461" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#ef4444" text-anchor="middle">7</text>
  <text x="812" y="477" font-family="system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Occupied</text>

  <rect x="874" y="445" width="100" height="40" rx="6" fill="#1e293b"/>
  <text x="924" y="461" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#f59e0b" text-anchor="middle">3</text>
  <text x="924" y="477" font-family="system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Reserved</text>

  <!-- Bottom title -->
  <text x="600" y="575" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">Freespace</text>
  <text x="600" y="600" font-family="system-ui,sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Space Management Application · PHP</text>
</svg>
