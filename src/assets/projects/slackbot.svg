<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1a0f2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="4" fill="url(#accent)"/>

  <!-- Glow -->
  <circle cx="300" cy="315" r="300" fill="#8b5cf6" opacity="0.04"/>
  <circle cx="900" cy="315" r="300" fill="#06b6d4" opacity="0.04"/>

  <!-- Slack-style channel mockup on left -->
  <rect x="80" y="100" width="480" height="430" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <!-- Header -->
  <rect x="80" y="100" width="480" height="52" rx="12" fill="#0f172a"/>
  <rect x="80" y="140" width="480" height="12" fill="#0f172a"/>
  <text x="150" y="132" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="white"># daily-standup</text>
  <circle cx="430" cy="126" r="8" fill="#22c55e"/>
  <text x="445" y="130" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Bot online</text>

  <!-- Messages -->
  <circle cx="116" cy="185" r="16" fill="#8b5cf6"/>
  <text x="116" y="190" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">B</text>
  <text x="142" y="178" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#8b5cf6">StandupBot</text>
  <text x="142" y="196" font-family="system-ui,sans-serif" font-size="13" fill="#e2e8f0">🌅 Good morning team! Time for</text>
  <text x="142" y="214" font-family="system-ui,sans-serif" font-size="13" fill="#e2e8f0">your daily standup. Let's go! 🚀</text>

  <line x1="100" y1="235" x2="540" y2="235" stroke="#334155" stroke-width="1" opacity="0.5"/>

  <circle cx="116" cy="265" r="16" fill="#3b82f6"/>
  <text x="116" y="270" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">MH</text>
  <text x="142" y="258" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#3b82f6">Mehdi</text>
  <text x="142" y="276" font-family="system-ui,sans-serif" font-size="13" fill="#e2e8f0">✅ Yesterday: Fixed auth bug</text>
  <text x="142" y="294" font-family="system-ui,sans-serif" font-size="13" fill="#e2e8f0">📋 Today: API integration</text>
  <text x="142" y="312" font-family="system-ui,sans-serif" font-size="13" fill="#e2e8f0">🚫 Blockers: None</text>

  <line x1="100" y1="330" x2="540" y2="330" stroke="#334155" stroke-width="1" opacity="0.5"/>

  <circle cx="116" cy="360" r="16" fill="#8b5cf6"/>
  <text x="116" y="365" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">B</text>
  <text x="142" y="353" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#8b5cf6">StandupBot</text>
  <text x="142" y="371" font-family="system-ui,sans-serif" font-size="13" fill="#e2e8f0">✨ Thanks! Standup summary</text>
  <text x="142" y="389" font-family="system-ui,sans-serif" font-size="13" fill="#e2e8f0">saved. See you tomorrow! 👋</text>

  <!-- Input box -->
  <rect x="96" y="490" width="448" height="36" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="115" y="513" font-family="system-ui,sans-serif" font-size="13" fill="#475569">Message #daily-standup</text>

  <!-- Code panel on right -->
  <rect x="620" y="100" width="500" height="430" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <!-- Code header -->
  <rect x="620" y="100" width="500" height="44" rx="12" fill="#1e293b"/>
  <rect x="620" y="132" width="500" height="12" fill="#1e293b"/>
  <circle cx="650" cy="122" r="6" fill="#ef4444" opacity="0.7"/>
  <circle cx="670" cy="122" r="6" fill="#f59e0b" opacity="0.7"/>
  <circle cx="690" cy="122" r="6" fill="#22c55e" opacity="0.7"/>
  <text x="860" y="127" font-family="system-ui,sans-serif" font-size="12" fill="#64748b" text-anchor="middle">standup_bot.py</text>

  <!-- Python code -->
  <text x="645" y="178" font-family="monospace" font-size="13" fill="#8b5cf6">import</text>
  <text x="700" y="178" font-family="monospace" font-size="13" fill="#e2e8f0">slack_sdk, schedule</text>

  <text x="645" y="210" font-family="monospace" font-size="13" fill="#64748b">@app.event("message")</text>
  <text x="645" y="240" font-family="monospace" font-size="13" fill="#8b5cf6">def</text>
  <text x="680" y="240" font-family="monospace" font-size="13" fill="#06b6d4">handle_standup</text>
  <text x="810" y="240" font-family="monospace" font-size="13" fill="#e2e8f0">(event):</text>

  <text x="665" y="270" font-family="monospace" font-size="13" fill="#8b5cf6">if</text>
  <text x="690" y="270" font-family="monospace" font-size="13" fill="#e2e8f0">is_standup_time():</text>

  <text x="685" y="300" font-family="monospace" font-size="13" fill="#e2e8f0">collect_updates()</text>
  <text x="685" y="330" font-family="monospace" font-size="13" fill="#e2e8f0">post_summary()</text>
  <text x="685" y="360" font-family="monospace" font-size="13" fill="#e2e8f0">schedule_tomorrow()</text>

  <text x="645" y="400" font-family="monospace" font-size="13" fill="#64748b"># Auto-runs every weekday</text>
  <text x="645" y="430" font-family="monospace" font-size="13" fill="#64748b"># at 9:00 AM 🕘</text>

  <!-- Tech badges -->
  <rect x="645" y="455" width="90" height="30" rx="15" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="690" y="474" font-family="system-ui,sans-serif" font-size="13" fill="#f59e0b" text-anchor="middle">Python</text>

  <rect x="745" y="455" width="90" height="30" rx="15" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="790" y="474" font-family="system-ui,sans-serif" font-size="13" fill="#8b5cf6" text-anchor="middle">Slack API</text>

  <!-- Title -->
  <text x="600" y="575" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">Daily Meeting Host Slack Bot</text>
  <text x="600" y="600" font-family="system-ui,sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Automates daily stand-up meetings · Python · Slack API</text>
</svg>
