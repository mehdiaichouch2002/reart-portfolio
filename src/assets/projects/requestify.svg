<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0d1f2d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="4" fill="url(#accent)"/>

  <!-- Glow -->
  <circle cx="600" cy="315" r="350" fill="#06b6d4" opacity="0.03"/>

  <!-- Fake browser window / card mockup -->
  <rect x="120" y="100" width="960" height="430" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <!-- Browser bar -->
  <rect x="120" y="100" width="960" height="44" rx="12" fill="#0f172a"/>
  <rect x="120" y="132" width="960" height="12" fill="#0f172a"/>
  <circle cx="158" cy="122" r="7" fill="#ef4444" opacity="0.7"/>
  <circle cx="182" cy="122" r="7" fill="#f59e0b" opacity="0.7"/>
  <circle cx="206" cy="122" r="7" fill="#22c55e" opacity="0.7"/>
  <!-- URL bar -->
  <rect x="240" y="111" width="680" height="22" rx="11" fill="#1e293b"/>
  <text x="580" y="126" font-family="system-ui,monospace" font-size="12" fill="#64748b" text-anchor="middle">requestify.app / dashboard</text>

  <!-- Sidebar -->
  <rect x="120" y="144" width="200" height="386" fill="#0f172a" rx="0"/>
  <text x="220" y="200" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#94a3b8" text-anchor="middle" letter-spacing="2">MENU</text>
  <rect x="140" y="215" width="160" height="34" rx="6" fill="#06b6d4" opacity="0.15"/>
  <text x="220" y="237" font-family="system-ui,sans-serif" font-size="13" fill="#06b6d4" text-anchor="middle">▣  Dashboard</text>
  <text x="220" y="285" font-family="system-ui,sans-serif" font-size="13" fill="#64748b" text-anchor="middle">↗  Requests</text>
  <text x="220" y="325" font-family="system-ui,sans-serif" font-size="13" fill="#64748b" text-anchor="middle">✓  Approvals</text>
  <text x="220" y="365" font-family="system-ui,sans-serif" font-size="13" fill="#64748b" text-anchor="middle">⚙  Settings</text>

  <!-- Main content area -->
  <!-- Stat cards -->
  <rect x="345" y="165" width="180" height="80" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="435" y="198" font-family="system-ui,sans-serif" font-size="28" font-weight="700" fill="#06b6d4" text-anchor="middle">124</text>
  <text x="435" y="222" font-family="system-ui,sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Total Requests</text>

  <rect x="545" y="165" width="180" height="80" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="635" y="198" font-family="system-ui,sans-serif" font-size="28" font-weight="700" fill="#22c55e" text-anchor="middle">98</text>
  <text x="635" y="222" font-family="system-ui,sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Approved</text>

  <rect x="745" y="165" width="180" height="80" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="835" y="198" font-family="system-ui,sans-serif" font-size="28" font-weight="700" fill="#f59e0b" text-anchor="middle">26</text>
  <text x="835" y="222" font-family="system-ui,sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Pending</text>

  <!-- Table -->
  <rect x="345" y="265" width="700" height="32" rx="4" fill="#0f172a"/>
  <text x="380" y="286" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8">ID</text>
  <text x="440" y="286" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8">Title</text>
  <text x="700" y="286" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8">Status</text>
  <text x="900" y="286" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8">Date</text>

  <line x1="345" y1="300" x2="1045" y2="300" stroke="#1e293b" stroke-width="1"/>

  <text x="380" y="325" font-family="system-ui,monospace" font-size="12" fill="#64748b">#001</text>
  <text x="440" y="325" font-family="system-ui,sans-serif" font-size="12" fill="#e2e8f0">Equipment Request</text>
  <rect x="680" y="313" width="70" height="20" rx="10" fill="#22c55e" opacity="0.2"/>
  <text x="715" y="327" font-family="system-ui,sans-serif" font-size="11" fill="#22c55e" text-anchor="middle">Approved</text>
  <text x="900" y="325" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">Jan 15</text>

  <line x1="345" y1="340" x2="1045" y2="340" stroke="#1e293b" stroke-width="1" opacity="0.5"/>

  <text x="380" y="365" font-family="system-ui,monospace" font-size="12" fill="#64748b">#002</text>
  <text x="440" y="365" font-family="system-ui,sans-serif" font-size="12" fill="#e2e8f0">Leave Request</text>
  <rect x="680" y="353" width="65" height="20" rx="10" fill="#f59e0b" opacity="0.2"/>
  <text x="713" y="367" font-family="system-ui,sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle">Pending</text>
  <text x="900" y="365" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">Jan 18</text>

  <line x1="345" y1="380" x2="1045" y2="380" stroke="#1e293b" stroke-width="1" opacity="0.5"/>

  <text x="380" y="405" font-family="system-ui,monospace" font-size="12" fill="#64748b">#003</text>
  <text x="440" y="405" font-family="system-ui,sans-serif" font-size="12" fill="#e2e8f0">Budget Approval</text>
  <rect x="680" y="393" width="70" height="20" rx="10" fill="#22c55e" opacity="0.2"/>
  <text x="715" y="407" font-family="system-ui,sans-serif" font-size="11" fill="#22c55e" text-anchor="middle">Approved</text>
  <text x="900" y="405" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">Jan 20</text>

  <!-- Bottom title area -->
  <text x="600" y="575" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">Requestify</text>
  <text x="600" y="600" font-family="system-ui,sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Request Management System · Laravel</text>
</svg>
