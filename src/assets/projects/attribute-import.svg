<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="4" fill="url(#accent)"/>

  <!-- Glow -->
  <circle cx="300" cy="300" r="280" fill="#f97316" opacity="0.04"/>
  <circle cx="900" cy="330" r="260" fill="#ef4444" opacity="0.03"/>

  <!-- Left panel: Magento Admin form -->
  <rect x="80" y="100" width="480" height="430" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="80" y="100" width="480" height="52" rx="12" fill="#0f172a"/>
  <rect x="80" y="140" width="480" height="12" fill="#0f172a"/>
  <text x="200" y="131" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#94a3b8">Stores → Attributes → Import Attributes</text>

  <!-- Form fields -->
  <text x="110" y="180" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">Attribute</text>
  <rect x="110" y="188" width="420" height="34" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="126" y="210" font-family="system-ui,sans-serif" font-size="13" fill="#e2e8f0">color  (Visual Swatch)</text>
  <text x="500" y="210" font-family="system-ui,sans-serif" font-size="11" fill="#f97316">▼</text>

  <text x="110" y="244" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">CSV File</text>
  <rect x="110" y="252" width="420" height="34" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="320" y="274" font-family="system-ui,sans-serif" font-size="12" fill="#475569" text-anchor="middle">color_options.csv</text>

  <!-- Action buttons -->
  <rect x="110" y="302" width="120" height="34" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="170" y="323" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#3b82f6" text-anchor="middle">Check Data</text>

  <rect x="244" y="302" width="120" height="34" rx="6" fill="#1a3326" stroke="#22c55e" stroke-width="1"/>
  <text x="304" y="323" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#22c55e" text-anchor="middle">Import</text>

  <rect x="378" y="302" width="100" height="34" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="428" y="323" font-family="system-ui,sans-serif" font-size="12" fill="#64748b" text-anchor="middle">View Log</text>

  <!-- Validation result -->
  <rect x="110" y="352" width="420" height="130" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="126" y="373" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#22c55e">✔ Validation passed — 6 options ready to import</text>
  <line x1="110" y1="382" x2="530" y2="382" stroke="#1e293b" stroke-width="1"/>
  <text x="126" y="400" font-family="monospace" font-size="11" fill="#64748b">INFO   color · Red · #FF0000 · sort_order=1</text>
  <text x="126" y="418" font-family="monospace" font-size="11" fill="#64748b">INFO   color · Blue · #0000FF · sort_order=2</text>
  <text x="126" y="436" font-family="monospace" font-size="11" fill="#f59e0b">WARN   color · Green already exists — skipped</text>
  <text x="126" y="454" font-family="monospace" font-size="11" fill="#64748b">INFO   color · Yellow · #FFD700 · sort_order=4</text>
  <text x="126" y="472" font-family="monospace" font-size="11" fill="#22c55e">INFO   Import complete — 5 created, 1 skipped</text>

  <!-- Right panel: CSV preview -->
  <rect x="620" y="100" width="500" height="430" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <rect x="620" y="100" width="500" height="44" rx="12" fill="#1e293b"/>
  <rect x="620" y="132" width="500" height="12" fill="#1e293b"/>
  <circle cx="650" cy="122" r="6" fill="#ef4444" opacity="0.7"/>
  <circle cx="670" cy="122" r="6" fill="#f59e0b" opacity="0.7"/>
  <circle cx="690" cy="122" r="6" fill="#22c55e" opacity="0.7"/>
  <text x="870" y="127" font-family="system-ui,sans-serif" font-size="12" fill="#64748b" text-anchor="middle">color_options.csv</text>

  <!-- CSV header row -->
  <rect x="635" y="152" width="470" height="24" rx="4" fill="#1e293b"/>
  <text x="645" y="168" font-family="monospace" font-size="11" fill="#f97316">attribute_code</text>
  <text x="760" y="168" font-family="monospace" font-size="11" fill="#f97316">store_view</text>
  <text x="855" y="168" font-family="monospace" font-size="11" fill="#f97316">value</text>
  <text x="920" y="168" font-family="monospace" font-size="11" fill="#f97316">hex_code</text>
  <text x="1010" y="168" font-family="monospace" font-size="11" fill="#f97316">sort</text>
  <text x="1060" y="168" font-family="monospace" font-size="11" fill="#f97316">def</text>

  <!-- CSV rows -->
  <text x="645" y="196" font-family="monospace" font-size="11" fill="#94a3b8">color</text>
  <text x="760" y="196" font-family="monospace" font-size="11" fill="#3b82f6">default</text>
  <text x="855" y="196" font-family="monospace" font-size="11" fill="#e2e8f0">Red</text>
  <text x="920" y="196" font-family="monospace" font-size="11" fill="#ef4444">#FF0000</text>
  <text x="1010" y="196" font-family="monospace" font-size="11" fill="#64748b">1</text>
  <text x="1060" y="196" font-family="monospace" font-size="11" fill="#22c55e">1</text>

  <text x="645" y="218" font-family="monospace" font-size="11" fill="#94a3b8">color</text>
  <text x="760" y="218" font-family="monospace" font-size="11" fill="#8b5cf6">fr</text>
  <text x="855" y="218" font-family="monospace" font-size="11" fill="#e2e8f0">Rouge</text>
  <text x="920" y="218" font-family="monospace" font-size="11" fill="#ef4444">#FF0000</text>
  <text x="1010" y="218" font-family="monospace" font-size="11" fill="#64748b">1</text>
  <text x="1060" y="218" font-family="monospace" font-size="11" fill="#64748b">1</text>

  <text x="645" y="240" font-family="monospace" font-size="11" fill="#94a3b8">color</text>
  <text x="760" y="240" font-family="monospace" font-size="11" fill="#8b5cf6">en</text>
  <text x="855" y="240" font-family="monospace" font-size="11" fill="#e2e8f0">Red</text>
  <text x="920" y="240" font-family="monospace" font-size="11" fill="#ef4444">#FF0000</text>
  <text x="1010" y="240" font-family="monospace" font-size="11" fill="#64748b">1</text>
  <text x="1060" y="240" font-family="monospace" font-size="11" fill="#64748b">1</text>

  <line x1="635" y1="252" x2="1105" y2="252" stroke="#1e293b" stroke-width="1"/>

  <text x="645" y="272" font-family="monospace" font-size="11" fill="#94a3b8">color</text>
  <text x="760" y="272" font-family="monospace" font-size="11" fill="#3b82f6">default</text>
  <text x="855" y="272" font-family="monospace" font-size="11" fill="#e2e8f0">Blue</text>
  <text x="920" y="272" font-family="monospace" font-size="11" fill="#3b82f6">#0000FF</text>
  <text x="1010" y="272" font-family="monospace" font-size="11" fill="#64748b">2</text>
  <text x="1060" y="272" font-family="monospace" font-size="11" fill="#64748b">0</text>

  <text x="645" y="294" font-family="monospace" font-size="11" fill="#94a3b8">color</text>
  <text x="760" y="294" font-family="monospace" font-size="11" fill="#8b5cf6">fr</text>
  <text x="855" y="294" font-family="monospace" font-size="11" fill="#e2e8f0">Bleu</text>
  <text x="920" y="294" font-family="monospace" font-size="11" fill="#3b82f6">#0000FF</text>
  <text x="1010" y="294" font-family="monospace" font-size="11" fill="#64748b">2</text>
  <text x="1060" y="294" font-family="monospace" font-size="11" fill="#64748b">0</text>

  <text x="645" y="316" font-family="monospace" font-size="11" fill="#94a3b8">color</text>
  <text x="760" y="316" font-family="monospace" font-size="11" fill="#8b5cf6">en</text>
  <text x="855" y="316" font-family="monospace" font-size="11" fill="#e2e8f0">Blue</text>
  <text x="920" y="316" font-family="monospace" font-size="11" fill="#3b82f6">#0000FF</text>
  <text x="1010" y="316" font-family="monospace" font-size="11" fill="#64748b">2</text>
  <text x="1060" y="316" font-family="monospace" font-size="11" fill="#64748b">0</text>

  <!-- Architecture flow -->
  <rect x="635" y="345" width="470" height="150" rx="8" fill="#1e293b"/>
  <text x="870" y="364" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#f97316" text-anchor="middle">Architecture</text>

  <text x="645" y="386" font-family="monospace" font-size="11" fill="#06b6d4">StreamingReader</text>
  <text x="775" y="386" font-family="monospace" font-size="11" fill="#64748b">→ O(1) memory per row</text>
  <text x="645" y="406" font-family="monospace" font-size="11" fill="#22c55e">Validator</text>
  <text x="720" y="406" font-family="monospace" font-size="11" fill="#64748b">→ stateless, no DB writes</text>
  <text x="645" y="426" font-family="monospace" font-size="11" fill="#f97316">ImportService</text>
  <text x="745" y="426" font-family="monospace" font-size="11" fill="#64748b">→ groups rows by option</text>
  <text x="645" y="446" font-family="monospace" font-size="11" fill="#8b5cf6">OptionProcessor</text>
  <text x="770" y="446" font-family="monospace" font-size="11" fill="#64748b">→ bulk insertOnDuplicate</text>
  <text x="645" y="466" font-family="monospace" font-size="11" fill="#3b82f6">CacheManager</text>
  <text x="745" y="466" font-family="monospace" font-size="11" fill="#64748b">→ clears eav + full_page</text>

  <!-- Tech badges -->
  <rect x="635" y="500" width="90" height="26" rx="13" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="680" y="517" font-family="system-ui,sans-serif" font-size="11" fill="#f97316" text-anchor="middle">Magento 2</text>

  <rect x="735" y="500" width="60" height="26" rx="13" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="765" y="517" font-family="system-ui,sans-serif" font-size="11" fill="#3b82f6" text-anchor="middle">PHP 8.1</text>

  <rect x="805" y="500" width="55" height="26" rx="13" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="832" y="517" font-family="system-ui,sans-serif" font-size="11" fill="#64748b" text-anchor="middle">CSV</text>

  <rect x="870" y="500" width="75" height="26" rx="13" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="907" y="517" font-family="system-ui,sans-serif" font-size="11" fill="#22c55e" text-anchor="middle">Composer</text>

  <!-- Bottom title -->
  <text x="600" y="575" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">Attribute Import — Magento 2 Module</text>
  <text x="600" y="600" font-family="system-ui,sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Bulk CSV import for product attribute options · PHP 8.1 · Magento 2.4</text>
</svg>
