<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="4" fill="url(#accent)"/>

  <!-- Glow -->
  <circle cx="300" cy="250" r="300" fill="#3b82f6" opacity="0.04"/>
  <circle cx="900" cy="380" r="280" fill="#06b6d4" opacity="0.03"/>

  <!-- Terminal / Docker panel on left -->
  <rect x="80" y="100" width="480" height="430" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <rect x="80" y="100" width="480" height="44" rx="12" fill="#1e293b"/>
  <rect x="80" y="132" width="480" height="12" fill="#1e293b"/>
  <circle cx="110" cy="122" r="6" fill="#ef4444" opacity="0.7"/>
  <circle cx="130" cy="122" r="6" fill="#f59e0b" opacity="0.7"/>
  <circle cx="150" cy="122" r="6" fill="#22c55e" opacity="0.7"/>
  <text x="310" y="127" font-family="system-ui,monospace" font-size="12" fill="#64748b" text-anchor="middle">docker-compose.yml</text>

  <!-- YAML content -->
  <text x="110" y="170" font-family="monospace" font-size="12" fill="#64748b">version: '3.8'</text>
  <text x="110" y="192" font-family="monospace" font-size="12" fill="#94a3b8">services:</text>
  <text x="128" y="214" font-family="monospace" font-size="12" fill="#3b82f6">  app:</text>
  <text x="146" y="234" font-family="monospace" font-size="12" fill="#64748b">    image: php:8.2-fpm</text>
  <text x="146" y="254" font-family="monospace" font-size="12" fill="#64748b">    volumes:</text>
  <text x="164" y="274" font-family="monospace" font-size="12" fill="#22c55e">      - ./src:/var/www</text>
  <text x="128" y="300" font-family="monospace" font-size="12" fill="#3b82f6">  nginx:</text>
  <text x="146" y="320" font-family="monospace" font-size="12" fill="#64748b">    image: nginx:alpine</text>
  <text x="146" y="340" font-family="monospace" font-size="12" fill="#64748b">    ports:</text>
  <text x="164" y="360" font-family="monospace" font-size="12" fill="#22c55e">      - "80:80"</text>
  <text x="128" y="386" font-family="monospace" font-size="12" fill="#3b82f6">  db:</text>
  <text x="146" y="406" font-family="monospace" font-size="12" fill="#64748b">    image: mysql:8</text>
  <text x="146" y="426" font-family="monospace" font-size="12" fill="#64748b">    environment:</text>
  <text x="164" y="446" font-family="monospace" font-size="12" fill="#22c55e">      MYSQL_DB: library</text>
  <text x="164" y="466" font-family="monospace" font-size="12" fill="#22c55e">      MYSQL_ROOT_PW: ****</text>

  <!-- Book catalog panel on right -->
  <rect x="620" y="100" width="500" height="430" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="620" y="100" width="500" height="44" rx="12" fill="#0f172a"/>
  <rect x="620" y="132" width="500" height="12" fill="#0f172a"/>
  <text x="870" y="127" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#94a3b8" text-anchor="middle">Library Management System</text>

  <!-- Search bar -->
  <rect x="640" y="158" width="460" height="32" rx="16" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="660" y="179" font-family="system-ui,sans-serif" font-size="12" fill="#475569">🔍  Search books...</text>

  <!-- Book list -->
  <rect x="640" y="202" width="460" height="52" rx="6" fill="#0f172a"/>
  <rect x="650" y="212" width="32" height="32" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="666" y="232" font-family="system-ui,sans-serif" font-size="14" fill="#3b82f6" text-anchor="middle">📘</text>
  <text x="695" y="225" font-family="system-ui,sans-serif" font-size="12" fill="#e2e8f0" font-weight="600">Clean Code</text>
  <text x="695" y="242" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Robert C. Martin · Available</text>
  <rect x="1030" y="215" width="60" height="22" rx="11" fill="#22c55e" opacity="0.2"/>
  <text x="1060" y="230" font-family="system-ui,sans-serif" font-size="11" fill="#22c55e" text-anchor="middle">Available</text>

  <line x1="640" y1="256" x2="1100" y2="256" stroke="#334155" stroke-width="1" opacity="0.5"/>

  <rect x="640" y="260" width="460" height="52" rx="6" fill="#0f172a"/>
  <rect x="650" y="270" width="32" height="32" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="666" y="290" font-family="system-ui,sans-serif" font-size="14" fill="#f59e0b" text-anchor="middle">📙</text>
  <text x="695" y="283" font-family="system-ui,sans-serif" font-size="12" fill="#e2e8f0" font-weight="600">The Pragmatic Programmer</text>
  <text x="695" y="300" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Hunt &amp; Thomas · Borrowed</text>
  <rect x="1030" y="273" width="60" height="22" rx="11" fill="#f59e0b" opacity="0.2"/>
  <text x="1060" y="288" font-family="system-ui,sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle">Borrowed</text>

  <line x1="640" y1="314" x2="1100" y2="314" stroke="#334155" stroke-width="1" opacity="0.5"/>

  <rect x="640" y="318" width="460" height="52" rx="6" fill="#0f172a"/>
  <rect x="650" y="328" width="32" height="32" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="666" y="348" font-family="system-ui,sans-serif" font-size="14" fill="#22c55e" text-anchor="middle">📗</text>
  <text x="695" y="341" font-family="system-ui,sans-serif" font-size="12" fill="#e2e8f0" font-weight="600">Design Patterns</text>
  <text x="695" y="358" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Gang of Four · Available</text>
  <rect x="1030" y="331" width="60" height="22" rx="11" fill="#22c55e" opacity="0.2"/>
  <text x="1060" y="346" font-family="system-ui,sans-serif" font-size="11" fill="#22c55e" text-anchor="middle">Available</text>

  <!-- Stats row -->
  <rect x="640" y="390" width="130" height="60" rx="8" fill="#0f172a"/>
  <text x="705" y="412" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#3b82f6" text-anchor="middle">243</text>
  <text x="705" y="430" font-family="system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Total Books</text>
  <text x="705" y="444" font-family="system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">in catalog</text>

  <rect x="785" y="390" width="130" height="60" rx="8" fill="#0f172a"/>
  <text x="850" y="412" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#22c55e" text-anchor="middle">31</text>
  <text x="850" y="430" font-family="system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Active</text>
  <text x="850" y="444" font-family="system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">borrowers</text>

  <rect x="930" y="390" width="130" height="60" rx="8" fill="#0f172a"/>
  <text x="995" y="412" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#f59e0b" text-anchor="middle">5</text>
  <text x="995" y="430" font-family="system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Overdue</text>
  <text x="995" y="444" font-family="system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">returns</text>

  <!-- Tech badges -->
  <rect x="640" y="468" width="70" height="28" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="675" y="486" font-family="system-ui,sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle">PHP</text>

  <rect x="720" y="468" width="75" height="28" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="757" y="486" font-family="system-ui,sans-serif" font-size="11" fill="#3b82f6" text-anchor="middle">MySQL</text>

  <rect x="805" y="468" width="70" height="28" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="840" y="486" font-family="system-ui,sans-serif" font-size="11" fill="#06b6d4" text-anchor="middle">Nginx</text>

  <rect x="885" y="468" width="75" height="28" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="922" y="486" font-family="system-ui,sans-serif" font-size="11" fill="#22c55e" text-anchor="middle">Docker</text>

  <!-- Bottom title -->
  <text x="600" y="575" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">Library Management System</text>
  <text x="600" y="600" font-family="system-ui,sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Dockerized · PHP · MySQL · Nginx</text>
</svg>
