<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.04" stroke="white" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/><line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Accent line top -->
  <rect width="1200" height="4" fill="url(#accent)"/>

  <!-- Glow circles -->
  <circle cx="200" cy="150" r="300" fill="#06b6d4" opacity="0.04"/>
  <circle cx="1000" cy="480" r="280" fill="#3b82f6" opacity="0.05"/>

  <!-- Top label -->
  <rect x="80" y="72" width="140" height="30" rx="15" fill="#06b6d4" opacity="0.15"/>
  <text x="150" y="92" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#06b6d4" text-anchor="middle" letter-spacing="1">COMMERCIAL</text>

  <!-- Big "B2B" -->
  <text x="600" y="220" font-family="system-ui,sans-serif" font-size="130" font-weight="900" fill="white" text-anchor="middle" opacity="0.08" letter-spacing="-4">B2B</text>

  <!-- Title -->
  <text x="600" y="290" font-family="system-ui,sans-serif" font-size="64" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-1">CARHARTT WIP</text>
  <text x="600" y="350" font-family="system-ui,sans-serif" font-size="24" fill="#94a3b8" text-anchor="middle" letter-spacing="4">B2B E-COMMERCE PLATFORM</text>

  <!-- Divider -->
  <rect x="500" y="385" width="200" height="2" fill="url(#accent)" opacity="0.6"/>

  <!-- Tech badges -->
  <rect x="436" y="415" width="110" height="34" rx="17" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="491" y="437" font-family="system-ui,sans-serif" font-size="14" fill="#06b6d4" text-anchor="middle">Magento 2</text>

  <rect x="562" y="415" width="80" height="34" rx="17" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="602" y="437" font-family="system-ui,sans-serif" font-size="14" fill="#06b6d4" text-anchor="middle">PHP</text>

  <rect x="658" y="415" width="110" height="34" rx="17" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="713" y="437" font-family="system-ui,sans-serif" font-size="14" fill="#06b6d4" text-anchor="middle">TypeScript</text>

  <!-- URL -->
  <circle cx="350" cy="555" r="5" fill="#22c55e"/>
  <text x="365" y="560" font-family="system-ui,monospace" font-size="15" fill="#64748b">b2b.carhartt-wip.com</text>
</svg>
