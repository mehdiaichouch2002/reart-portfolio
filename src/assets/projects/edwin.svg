<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1a1008"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="4" fill="url(#accent)"/>

  <!-- Glow -->
  <circle cx="600" cy="300" r="400" fill="#f59e0b" opacity="0.03"/>

  <!-- Browser frame -->
  <rect x="80" y="90" width="1040" height="450" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="80" y="90" width="1040" height="44" rx="12" fill="#0f172a"/>
  <rect x="80" y="122" width="1040" height="12" fill="#0f172a"/>
  <circle cx="118" cy="112" r="6" fill="#ef4444" opacity="0.7"/>
  <circle cx="140" cy="112" r="6" fill="#f59e0b" opacity="0.7"/>
  <circle cx="162" cy="112" r="6" fill="#22c55e" opacity="0.7"/>
  <rect x="300" y="101" width="600" height="22" rx="11" fill="#1e293b"/>
  <text x="600" y="116" font-family="system-ui,monospace" font-size="12" fill="#64748b" text-anchor="middle">edwin-europe.com / jeans</text>

  <!-- NavBar with Edwin branding -->
  <rect x="80" y="134" width="1040" height="52" fill="#111827"/>
  <text x="600" y="166" font-family="system-ui,sans-serif" font-size="22" font-weight="900" fill="white" text-anchor="middle" letter-spacing="8">EDWIN</text>
  <text x="195" y="166" font-family="system-ui,sans-serif" font-size="11" fill="#9ca3af">Men</text>
  <text x="245" y="166" font-family="system-ui,sans-serif" font-size="11" fill="#9ca3af">Women</text>
  <text x="305" y="166" font-family="system-ui,sans-serif" font-size="11" fill="#9ca3af">Jeans</text>
  <text x="355" y="166" font-family="system-ui,sans-serif" font-size="11" fill="#9ca3af">Sale</text>
  <text x="940" y="166" font-family="system-ui,sans-serif" font-size="11" fill="#9ca3af">🛒  Bag</text>

  <!-- Hero banner - denim texture feel -->
  <rect x="80" y="186" width="1040" height="170" fill="#1c2030"/>

  <!-- Diagonal stripe pattern for denim feel -->
  <g opacity="0.06" stroke="#f59e0b" stroke-width="2">
    <line x1="80" y1="186" x2="280" y2="356"/><line x1="180" y1="186" x2="380" y2="356"/>
    <line x1="280" y1="186" x2="480" y2="356"/><line x1="380" y1="186" x2="580" y2="356"/>
    <line x1="480" y1="186" x2="680" y2="356"/><line x1="580" y1="186" x2="780" y2="356"/>
    <line x1="680" y1="186" x2="880" y2="356"/><line x1="780" y1="186" x2="980" y2="356"/>
    <line x1="880" y1="186" x2="1080" y2="356"/><line x1="980" y1="186" x2="1120" y2="356"/>
  </g>

  <rect x="100" y="200" width="3" height="120" fill="#f59e0b"/>
  <text x="120" y="232" font-family="system-ui,sans-serif" font-size="11" fill="#f59e0b" letter-spacing="4">SINCE 1947</text>
  <text x="120" y="270" font-family="system-ui,sans-serif" font-size="38" font-weight="900" fill="white">The Original</text>
  <text x="120" y="308" font-family="system-ui,sans-serif" font-size="38" font-weight="900" fill="#f59e0b">Japanese Denim</text>
  <rect x="120" y="330" width="160" height="14" rx="7" fill="#f59e0b" opacity="0.15"/>
  <text x="200" y="341" font-family="system-ui,sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle" letter-spacing="2">EXPLORE COLLECTION</text>

  <!-- Product cards -->
  <rect x="115" y="375" width="230" height="140" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <rect x="115" y="375" width="230" height="90" rx="8" fill="#1c1c28"/>
  <rect x="115" y="453" width="230" height="12" fill="#1c1c28"/>
  <text x="230" y="484" font-family="system-ui,sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle" font-weight="600">ED-55 Regular Tapered</text>
  <text x="230" y="500" font-family="system-ui,sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle">€149</text>

  <rect x="365" y="375" width="230" height="140" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <rect x="365" y="375" width="230" height="90" rx="8" fill="#1e1c14"/>
  <rect x="365" y="453" width="230" height="12" fill="#1e1c14"/>
  <text x="480" y="484" font-family="system-ui,sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle" font-weight="600">Slim Tapered Kaihara</text>
  <text x="480" y="500" font-family="system-ui,sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle">€169</text>

  <rect x="615" y="375" width="230" height="140" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <rect x="615" y="375" width="230" height="90" rx="8" fill="#14181e"/>
  <rect x="615" y="453" width="230" height="12" fill="#14181e"/>
  <text x="730" y="484" font-family="system-ui,sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle" font-weight="600">Wide Leg Selvedge</text>
  <text x="730" y="500" font-family="system-ui,sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle">€189</text>

  <rect x="865" y="375" width="230" height="140" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <rect x="865" y="375" width="230" height="90" rx="8" fill="#1c1414"/>
  <rect x="865" y="453" width="230" height="12" fill="#1c1414"/>
  <text x="980" y="484" font-family="system-ui,sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle" font-weight="600">Classic Straight Cut</text>
  <text x="980" y="500" font-family="system-ui,sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle">€139</text>

  <!-- Bottom title -->
  <text x="600" y="575" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">Edwin</text>
  <text x="600" y="600" font-family="system-ui,sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Fashion Retail Platform · Magento 2 · PHP · TypeScript</text>
</svg>
